<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotebookLM — RAG Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f11; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 16px 24px; background: #1a1a1f; border-bottom: 1px solid #2a2a35; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.8rem; color: #888; background: #2a2a35; padding: 2px 8px; border-radius: 99px; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 300px; min-width: 260px; background: #14141a; border-right: 1px solid #2a2a35; display: flex; flex-direction: column; padding: 20px 16px; gap: 16px; }
    .sidebar h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }

    .drop-zone { border: 2px dashed #3a3a50; border-radius: 10px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.2s; color: #666; font-size: 0.85rem; }
    .drop-zone:hover, .drop-zone.over { border-color: #6c63ff; color: #a09cf7; background: #1a1a2e; }
    .drop-zone svg { display: block; margin: 0 auto 10px; opacity: 0.5; }
    #file-input { display: none; }

    .upload-btn { width: 100%; padding: 10px; background: #6c63ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
    .upload-btn:hover:not(:disabled) { background: #5a52e0; }
    .upload-btn:disabled { background: #3a3a55; color: #666; cursor: not-allowed; }

    .status { font-size: 0.8rem; color: #888; min-height: 20px; }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .status.loading { color: #facc15; }

    .doc-badge { background: #1e1e2e; border: 1px solid #3a3a50; border-radius: 8px; padding: 10px 12px; font-size: 0.8rem; color: #a09cf7; display: none; word-break: break-all; }
    .doc-badge.show { display: block; }

    /* Chat */
    .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }

    .empty-state { margin: auto; text-align: center; color: #444; }
    .empty-state svg { display: block; margin: 0 auto 12px; }
    .empty-state p { font-size: 0.9rem; }

    .msg { max-width: 720px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; }
    .msg.user .msg-bubble { background: #6c63ff; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble { background: #1e1e2e; border: 1px solid #2a2a35; border-bottom-left-radius: 4px; color: #e0e0e0; }
    .msg-label { font-size: 0.72rem; color: #555; margin-bottom: 4px; padding: 0 4px; }
    .msg.user .msg-label { text-align: right; }

    .thinking .msg-bubble { color: #888; font-style: italic; }

    .input-bar { padding: 16px 24px; border-top: 1px solid #2a2a35; display: flex; gap: 10px; background: #14141a; }
    #question { flex: 1; background: #1e1e2e; border: 1px solid #3a3a50; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; outline: none; resize: none; max-height: 120px; }
    #question:focus { border-color: #6c63ff; }
    #question::placeholder { color: #444; }
    .send-btn { padding: 10px 18px; background: #6c63ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; align-self: flex-end; transition: background 0.2s; }
    .send-btn:hover:not(:disabled) { background: #5a52e0; }
    .send-btn:disabled { background: #3a3a55; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>NotebookLM Clone</h1>
    <span>RAG-powered</span>
  </header>

  <div class="layout">
    <!-- Sidebar: Upload -->
    <aside class="sidebar">
      <h2>Document</h2>

      <div class="drop-zone" id="drop-zone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16v-8m0 0-3 3m3-3 3 3"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
        Drop PDF or TXT here<br/>or click to browse
        <input type="file" id="file-input" accept=".pdf,.txt" />
      </div>

      <button class="upload-btn" id="upload-btn" disabled>Upload & Index</button>
      <div class="status" id="status"></div>
      <div class="doc-badge" id="doc-badge"></div>
    </aside>

    <!-- Chat panel -->
    <section class="chat-panel">
      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>Upload a document, then ask anything about it.</p>
        </div>
      </div>

      <div class="input-bar">
        <textarea id="question" rows="1" placeholder="Ask a question about your document…" disabled></textarea>
        <button class="send-btn" id="send-btn" disabled>Send</button>
      </div>
    </section>
  </div>

  <script>
    let sessionId = null;
    let selectedFile = null;

    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const uploadBtn = document.getElementById("upload-btn");
    const statusEl = document.getElementById("status");
    const docBadge = document.getElementById("doc-badge");
    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("empty-state");
    const questionEl = document.getElementById("question");
    const sendBtn = document.getElementById("send-btn");

    // File selection
    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => selectFile(fileInput.files[0]));

    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("over");
      selectFile(e.dataTransfer.files[0]);
    });

    function selectFile(file) {
      if (!file) return;
      if (!file.name.endsWith(".pdf") && !file.name.endsWith(".txt")) {
        setStatus("Only PDF and .txt files are supported.", "error");
        return;
      }
      selectedFile = file;
      dropZone.querySelector("svg").nextSibling.textContent = "";
      dropZone.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${file.name}`;
      uploadBtn.disabled = false;
      setStatus("");
    }

    // Upload & index
    uploadBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      uploadBtn.disabled = true;
      setStatus("Uploading & indexing… this may take a moment.", "loading");

      const form = new FormData();
      form.append("file", selectedFile);

      try {
        const res = await fetch("/upload", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        sessionId = data.sessionId;
        setStatus(`✓ Indexed ${data.chunks} chunks. Ready to chat!`, "success");
        docBadge.textContent = `📄 ${selectedFile.name}`;
        docBadge.classList.add("show");
        questionEl.disabled = false;
        sendBtn.disabled = false;
        questionEl.focus();
      } catch (err) {
        setStatus("Error: " + err.message, "error");
        uploadBtn.disabled = false;
      }
    });

    // Chat
    sendBtn.addEventListener("click", sendMessage);
    questionEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
      const q = questionEl.value.trim();
      if (!q || !sessionId) return;

      emptyState.style.display = "none";
      appendMessage("user", q);
      questionEl.value = "";
      questionEl.style.height = "auto";
      sendBtn.disabled = true;

      const thinkingEl = appendMessage("assistant", "Thinking…", true);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, sessionId }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        thinkingEl.querySelector(".msg-bubble").textContent = data.answer;
        thinkingEl.classList.remove("thinking");
      } catch (err) {
        thinkingEl.querySelector(".msg-bubble").textContent = "Error: " + err.message;
        thinkingEl.classList.remove("thinking");
      } finally {
        sendBtn.disabled = false;
        questionEl.focus();
      }
    }

    function appendMessage(role, text, thinking = false) {
      const div = document.createElement("div");
      div.className = `msg ${role}${thinking ? " thinking" : ""}`;
      div.innerHTML = `<div class="msg-label">${role === "user" ? "You" : "AI"}</div><div class="msg-bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function setStatus(msg, type = "") {
      statusEl.textContent = msg;
      statusEl.className = "status " + type;
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Auto-resize textarea
    questionEl.addEventListener("input", () => {
      questionEl.style.height = "auto";
      questionEl.style.height = Math.min(questionEl.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>
